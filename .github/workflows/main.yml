name: Update Cat Train

on:
  schedule:
    - cron: "0 0 * * *" # 매일 한국 시간 기준 오전 9시경 실행
  workflow_dispatch: # 우리가 수동으로 '실행' 버튼을 누를 수 있게 해줌

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 설정이 있어야 서버가 파일을 저장할 수 있습니다
    steps:
      - uses: actions/checkout@v4 # 내 코드를 서버로 가져옴

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate SVG
        run: python generate_snake.py # 푸시하신 파이썬 파일 실행

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cat-snake.svg
          git commit -m "chore: update cat-snake.svg" || exit 0
          git push
